<!-- templates/core/index.html -->
{% extends 'base.html' %}
{% load static %}

{% block content %}

<!-- HERO SECTION -->
<div class="relative bg-white pt-10 pb-16">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 text-center">
        
        <h1 class="text-3xl md:text-4xl font-normal text-gray-700 mb-2">
            World's Largest <span class="font-bold text-brand-blue">Broker-Free</span> Property Site
        </h1>
        
        <!-- Feature Pills -->
        <div class="flex justify-center gap-4 mb-8 text-sm text-gray-600 mt-4">
            <span class="bg-orange-50 text-brand-orange px-3 py-1 rounded-md border border-orange-100 flex items-center gap-1">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                Rental Agreement
            </span>
            <span class="bg-orange-50 text-brand-orange px-3 py-1 rounded-md border border-orange-100 flex items-center gap-1">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                Next Day Delivery
            </span>
        </div>

        <!-- SEARCH CONTAINER BOX -->
        <div class="bg-white rounded-lg shadow-xl border border-gray-100 overflow-hidden text-left">
            
            <!-- Tabs -->
            <div class="flex border-b border-gray-200">
                <button class="px-8 py-3 text-sm font-medium text-gray-500 hover:bg-gray-50 focus:outline-none">Buy</button>
                <button class="px-8 py-3 text-sm font-medium text-brand-orange border-b-2 border-brand-orange bg-white focus:outline-none">Rent</button>
                <button class="px-8 py-3 text-sm font-medium text-gray-500 hover:bg-gray-50 focus:outline-none">Commercial</button>
            </div>

            <!-- Search Inputs -->
            <form action="{% url 'listings' %}" method="GET" class="p-4 md:p-6 bg-white">
                <div class="flex flex-col md:flex-row gap-2 md:gap-0 md:border md:border-gray-300 md:rounded-md">
                    
                    <!-- City Select (Styled to look merged) -->
                    <div class="relative md:w-1/4 md:border-r md:border-gray-300">
                        <select name="city" class="w-full appearance-none h-12 pl-4 pr-8 text-gray-700 bg-transparent focus:outline-none cursor-pointer">
                            <option value="bangalore">Bangalore</option>
                            <option value="mumbai">Mumbai</option>
                            <option value="pune">Pune</option>
                            <option value="delhi">Delhi</option>
                        </select>
                        <div class="absolute right-3 top-3 pointer-events-none">
                            <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </div>
                    </div>

                    <!-- Search Bar Text -->
                    <div class="flex-grow md:w-2/4">
                        <input type="text" name="q" placeholder="Search by locality or landmark..." class="w-full h-12 pl-4 text-gray-700 focus:outline-none" />
                    </div>

                    <!-- Submit Button -->
                    <div class="md:w-1/4">
                        <button type="submit" class="w-full h-12 bg-brand-orange text-white font-bold text-lg hover:bg-orange-600 transition flex items-center justify-center gap-2 md:rounded-r-sm">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                            Search
                        </button>
                    </div>
                </div>

                <!-- Radio Options -->
                <div class="flex gap-6 mt-4 pl-1">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="radio" name="type" class="text-brand-orange focus:ring-brand-orange h-4 w-4" checked>
                        <span class="text-sm text-gray-700">Full House</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="radio" name="type" class="text-brand-orange focus:ring-brand-orange h-4 w-4">
                        <span class="text-sm text-gray-700">PG/Hostel</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="radio" name="type" class="text-brand-orange focus:ring-brand-orange h-4 w-4">
                        <span class="text-sm text-gray-700">Flatmates</span>
                    </label>
                </div>
            </form>
        </div>

        <!-- POST AD CTA -->
        <div class="mt-12">
            <div class="relative flex py-5 items-center">
                <div class="flex-grow border-t border-gray-200"></div>
                <span class="flex-shrink-0 mx-4 text-gray-500 text-sm">Are you a Property Owner?</span>
                <div class="flex-grow border-t border-gray-200"></div>
            </div>
            
            <a href="{% url 'post_property' %}" class="inline-block px-8 py-3 bg-brand-blue text-white font-medium text-sm rounded shadow-md hover:bg-brand-dark transition transform hover:-translate-y-0.5">
                Post Free Property Ad
            </a>
        </div>
    </div>
</div>

<!-- VALUE PROPOSITION BAR (Grey Background) -->
<div class="bg-gray-100 py-6 border-t border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-4 flex justify-around text-center overflow-x-auto">
        
        <div class="flex flex-col items-center min-w-[100px]">
            <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-sm mb-2 text-brand-orange">
                ₹
            </div>
            <span class="text-xs font-semibold text-gray-700">Lowest Price</span>
        </div>

        <div class="flex flex-col items-center min-w-[100px]">
            <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-sm mb-2 text-brand-orange">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4"></path></svg>
            </div>
            <span class="text-xs font-semibold text-gray-700">New Offers</span>
        </div>

        <div class="flex flex-col items-center min-w-[100px]">
            <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-sm mb-2 text-brand-orange">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </div>
            <span class="text-xs font-semibold text-gray-700">Save Brokerage</span>
        </div>

        <div class="flex flex-col items-center min-w-[100px]">
             <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-sm mb-2 text-brand-orange">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
            </div>
            <span class="text-xs font-semibold text-gray-700">100% Verified</span>
        </div>

    </div>
</div>

{% endblock %}
