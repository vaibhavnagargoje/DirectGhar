{% extends 'base.html' %}

{% block title %}Access Restricted | DirectGhar{% endblock %}

{% block content %}
<section class="max-w-2xl mx-auto px-4 py-12 sm:py-16">
    <div class="bg-white border border-red-100 rounded-2xl shadow-sm p-6 sm:p-8">
        <div class="flex items-start gap-3">
            <div class="w-10 h-10 rounded-full bg-red-50 text-red-600 flex items-center justify-center text-xl font-bold">
                !
            </div>
            <div>
                <h1 class="text-2xl font-bold text-gray-900">Action Not Allowed</h1>
                <p class="mt-2 text-gray-700">
                    {{ message|default:"You do not have permission to access this page." }}
                </p>
            </div>
        </div>

        <div class="mt-6 flex flex-wrap gap-3">
            <a href="{% url 'listings' %}"
               class="inline-flex items-center justify-center px-4 py-2 rounded-lg bg-brand-blue text-white font-semibold hover:bg-brand-dark transition">
                Back to Listings
            </a>
            <a href="{% url 'home' %}"
               class="inline-flex items-center justify-center px-4 py-2 rounded-lg border border-gray-300 text-gray-700 font-semibold hover:bg-gray-50 transition">
                Go Home
            </a>
        </div>
    </div>
</section>
{% endblock %}
